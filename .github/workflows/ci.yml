name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install ruff mypy
      - run: ruff check swytchcode_runtime/
      - run: ruff format --check swytchcode_runtime/
      - run: mypy swytchcode_runtime/ || true
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -e . pytest pytest-cov
      - run: pytest tests/ -v --cov=swytchcode_runtime --cov-report=term-missing || echo "No tests found, skipping"
